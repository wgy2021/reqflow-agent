name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify database migrations
        env:
          DATABASE_URL: sqlite:///./ci_migration.db
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
          alembic check

      - name: Run tests
        run: python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Docker image
        run: docker build -t reqflow-agent:ci .

      - name: Smoke test Docker container
        run: |
          docker run -d \
            --name reqflow-agent-ci \
            -p 8000:8000 \
            -e LLM_PROVIDER=fake \
            -e DATABASE_URL=sqlite:///./ci_runtime.db \
            reqflow-agent:ci

          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:8000/health; then
              echo "Container health check passed."
              exit 0
            fi

            sleep 1
          done

          docker logs reqflow-agent-ci
          exit 1

      - name: Clean up Docker container
        if: always()
        run: docker rm -f reqflow-agent-ci || true